services:
  mysql:
    image: mysql:8.0
    container_name: guts_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: guts_db
      MYSQL_USER: guts_user
      MYSQL_PASSWORD: guts_password
    command:
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./Backend
    container_name: guts_backend
    restart: unless-stopped
    env_file:
      - ./.env.docker
    environment:
      DB_HOST: mysql
      DB_NAME: guts_db
      DB_USER: guts_user
      DB_PASSWORD: guts_password
      PORT: 5000
      CORS_ORIGIN: '*'
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5001:5000"

  frontend:
    build:
      context: ./Frontend
    container_name: guts_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data: